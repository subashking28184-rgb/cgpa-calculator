
<!DOCTYPE html>
<html>
<head>
    <title>CGPA Calculator</title>

    <style>
    body {
        font-family: Arial;
        background: linear-gradient(to right, #4facfe, #00f2fe);
        text-align: center;
    }

    .container {
        background: white;
        padding: 20px;
        width: 300px;
        margin: 50px auto;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
    }

    input {
        width: 90%;
        padding: 8px;
        margin: 5px;
    }

    button {
        padding: 10px;
        background: #4facfe;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background: #0077ff;
    }
    </style>

</head>
<body>
<body>

<div class="container">

<h2>CGPA Calculator</h2>

<input type="number" id="sub1" placeholder="Subject 1 Grade"><br><br>
<input type="number" id="sub2" placeholder="Subject 2 Grade"><br><br>
<input type="number" id="sub3" placeholder="Subject 3 Grade"><br><br>
<input type="number" id="sub4" placeholder="Subject 4 Grade"><br><br>
<input type="number" id="sub5" placeholder="Subject 5 Grade"><br><br>

<button onclick="calculateCGPA()">Calculate</button>

<h3 id="result"></h3>

</div>

<script>
function calculateCGPA() {
    let s1 = Number(document.getElementById("sub1").value);
    let s2 = Number(document.getElementById("sub2").value);
    let s3 = Number(document.getElementById("sub3").value);
    let s4 = Number(document.getElementById("sub4").value);
    let s5 = Number(document.getElementById("sub5").value);

    if (!s1 || !s2 || !s3 || !s4 || !s5) {
        document.getElementById("result").innerText = "Enter all subject grades!";
        return;
    }

    let cgpa = (s1 + s2 + s3 + s4 + s5) / 5;

    document.getElementById("result").innerText = "Your CGPA: " + cgpa.toFixed(2);
}
</script>

</body>
                                                                                                                                                                                                                                                             
</html>
